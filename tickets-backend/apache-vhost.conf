<VirtualHost *:8012>
    ServerName localhost
    DocumentRoot "C:/xampp/htdocs/boceto-1/tickets-backend/public"
    
    <Directory "C:/xampp/htdocs/boceto-1/tickets-backend/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Enable rewrite engine
        RewriteEngine On
        RewriteBase /
        
        # Handle API requests
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ index.php [QSA,L]
        
        # CORS headers
        <IfModule mod_headers.c>
            Header always set Access-Control-Allow-Origin "*"
            Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
            Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With"
        </IfModule>
        
        # Handle preflight requests
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ - [R=200,L]
    </Directory>
    
    ErrorLog "C:/xampp/apache/logs/tickets-backend-error.log"
    CustomLog "C:/xampp/apache/logs/tickets-backend-access.log" common
</VirtualHost>
